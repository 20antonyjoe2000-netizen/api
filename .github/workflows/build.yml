name: Build & Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java (required by Android Gradle) ──────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── 4. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── 6. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p dist
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk "dist/mf-explorer-${VERSION}.apk"
          echo "APK_PATH=dist/mf-explorer-${VERSION}.apk" >> "$GITHUB_ENV"
          echo "APK_NAME=mf-explorer-${VERSION}.apk" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # ── 7a. Versioned release (on tag push) ───────────────────────────────
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "MF Explorer ${{ env.VERSION }}"
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          body: |
            ## MF Explorer ${{ env.VERSION }}

            ### Install
            Download `${{ env.APK_NAME }}` below and install on any Android device (Android 5.0+).
            Enable **Install from unknown sources** in your device settings if prompted.

            ### Build info
            - Built from commit: `${{ github.sha }}`
            - Flutter channel: stable

      # ── 7b. Rolling "latest" release (on push to main) ────────────────────
      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MF Explorer — Latest Build"
          prerelease: true
          files: ${{ env.APK_PATH }}
          body: |
            ## Latest Build (auto-updated on every push to main)

            This is a rolling pre-release — always reflects the newest code on `main`.

            ### Install
            Download `${{ env.APK_NAME }}` below and install on any Android device (Android 5.0+).
            Enable **Install from unknown sources** in your device settings if prompted.

            ### Build info
            - Built from commit: `${{ github.sha }}`
            - Triggered by push to `main`
            - Flutter channel: stable

            > For stable versioned releases, see the [Releases page](../../releases).
